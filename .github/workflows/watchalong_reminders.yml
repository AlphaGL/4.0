name: Watch-along reminders

# Pings users who RSVP'd to a watch-along ~10-15 min before it starts.
# Needs these repo secrets (Settings → Secrets and variables → Actions):
#   SECRET_KEY, DATABASE_URL              (already set — to boot Django)
#   FIREBASE_SERVICE_ACCOUNT              (already set — to send the push)
#   CHAT_DATABASE_URL                     (NEW — the chat Supabase DB url)
#   APP_DATABASE_URL                      (NEW — the app Supabase DB url, has app_device)

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub may delay a few min)
  workflow_dispatch:        # also run on demand

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Send watch-along reminders
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          CHAT_DATABASE_URL: ${{ secrets.CHAT_DATABASE_URL }}
          APP_DATABASE_URL: ${{ secrets.APP_DATABASE_URL }}
        run: python manage.py notify_watchalongs

      - name: Notify hosts of new RSVPs
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          CHAT_DATABASE_URL: ${{ secrets.CHAT_DATABASE_URL }}
          APP_DATABASE_URL: ${{ secrets.APP_DATABASE_URL }}
        run: python manage.py notify_rsvps
