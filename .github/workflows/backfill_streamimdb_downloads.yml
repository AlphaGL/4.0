name: Backfill streams + downloads (streamimdb)

# Manual one-shot maintenance. Runs against this account's DATABASE_URL, so
# dispatch it once in EACH repo/account (site DB and app DB) to cover both.
#
#   3a  Fill stream_url on movies that already exist in the DB but have none,
#       by crawling streamimdb and enriching matches only (--update-only).
#   3b  Attach download links to stream-only movies (have a stream but zero
#       downloads) via a targeted 9jarocks → thenkiri search.
#
# Both hit live sites that block most IPs, so they only work from CI runners —
# not from a local machine.
on:
  workflow_dispatch:
    inputs:
      do_streams:
        description: '3a · fill missing stream_url from streamimdb'
        type: boolean
        default: true
      do_downloads:
        description: '3b · backfill downloads for stream-only movies'
        type: boolean
        default: true
      download_limit:
        description: '3b · max stream-only movies to process (blank = all)'
        required: false
        default: ''

jobs:
  backfill:
    name: "🔁 Backfill streams + downloads"
    runs-on: ubuntu-latest
    timeout-minutes: 350     # both crawls are large; give them room
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          SITE_URL=${{ secrets.SITE_URL }}
          ENVEOF

      # 3a — enrich-only: never creates new titles, only adds stream_url to
      # movies already in the DB that streamimdb also has.
      - name: "3a · Fill missing stream_url (streamimdb --update-only)"
        if: ${{ inputs.do_streams }}
        continue-on-error: true
        run: python manage.py scrape_streamimdb --media both --update-only --no-social

      # 3b — attach downloads to stream-only movies via targeted re-scrape.
      - name: "3b · Backfill downloads for stream-only movies"
        if: ${{ inputs.do_downloads }}
        continue-on-error: true
        run: |
          ARGS=""
          if [ -n "${{ inputs.download_limit }}" ]; then
            ARGS="--limit ${{ inputs.download_limit }}"
          fi
          echo "▶️  backfill_downloads $ARGS"
          python manage.py backfill_downloads $ARGS

      # Re-host any newly-attached posters / clean up dup links the backfill may
      # have introduced, so the catalogue stays tidy.
      - name: "Tidy up (dedupe links)"
        if: always()
        continue-on-error: true
        run: python manage.py cleanse_db --linkdupes
