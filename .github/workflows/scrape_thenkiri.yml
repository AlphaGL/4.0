name: Scrape Thenkiri + Upload to Telegram

on:
  schedule:
    - cron: '0 */12 * * *'   # every 12 hours (jobs 1-6)
    - cron: '0 6 * * *'     # daily at 6 AM UTC (also triggers job 7 — Asian Extras)
  workflow_dispatch:         # manual trigger from Actions tab
    inputs:
      upload_files:
        description: 'Upload files to private Telegram channel?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# ── Job priority / rationale ──────────────────────────────────────────────────
# JOB 1  Hollywood / International  — 3475 posts, highest volume
# JOB 2  TV Series                  — ongoing series, needs frequent episode checks
# JOB 3  Korean Drama               — 1086 posts, most active drama category
# JOB 4  Korean Movies              — 317 posts, standalone Korean films
# JOB 5  Bollywood                  — 139 posts, strong search demand
# JOB 6  Chinese (movies + dramas)  — 50+9 posts, combined to save runner minutes
# JOB 7  Asian Extras               — K-Variety (31) + Philippine (11), low volume,
#                                     runs only on manual trigger or daily at 6 AM
#
# All jobs run in PARALLEL on separate GitHub runners.
# One failing will NOT stop the others.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ══════════════════════════════════════════════════════════════
  # JOB 1 — Hollywood / International Movies
  # ══════════════════════════════════════════════════════════════
  scrape_hollywood:
    name: "🎬 Hollywood / International"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install telethon django-redis

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MOVIES_CHANNEL=${{ secrets.TELEGRAM_MOVIES_CHANNEL }}
          TELEGRAM_ANIME_CHANNEL=${{ secrets.TELEGRAM_ANIME_CHANNEL }}
          TELEGRAM_MANGA_CHANNEL=${{ secrets.TELEGRAM_MANGA_CHANNEL }}
          TWITTER_CLIENT_ID=${{ secrets.TWITTER_CLIENT_ID }}
          TWITTER_CLIENT_SECRET=${{ secrets.TWITTER_CLIENT_SECRET }}
          TWITTER_REFRESH_TOKEN=${{ secrets.TWITTER_REFRESH_TOKEN }}
          FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN=${{ secrets.FB_ACCESS_TOKEN }}
          SITE_URL=${{ secrets.SITE_URL }}
          TELETHON_API_ID=${{ secrets.TELETHON_API_ID }}
          TELETHON_API_HASH=${{ secrets.TELETHON_API_HASH }}
          TELETHON_SESSION_NAME=uploader
          TELETHON_PRIVATE_CHANNEL=${{ secrets.TELETHON_PRIVATE_CHANNEL }}
          ENVEOF

      - name: Restore Telethon session
        run: |
          echo "${{ secrets.TELETHON_SESSION_B64 }}" | base64 --decode > uploader.session
          echo "✅ Telethon session restored ($(wc -c < uploader.session) bytes)"

      - name: Scrape Hollywood
        run: |
          UPLOAD="${{ github.event.inputs.upload_files || 'true' }}"
          CMD="python manage.py scrape_thenkiri --category hollywood --max-pages 3"
          [ "$UPLOAD" = "true" ] && CMD="$CMD --upload-files"
          echo "▶️  $CMD"
          $CMD

      - name: Cleanup temp files
        if: always()
        run: |
          [ -d /tmp/tg_uploads ] && rm -rf /tmp/tg_uploads/* || true
          df -h /


