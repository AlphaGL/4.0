name: Scrape All Sources + Upload to Telegram

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      upload_files:
        description: 'Upload files to private Telegram channel?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

# A migrate job runs FIRST (applies DB schema changes to this account's DB),
# then all scrapers run in PARALLEL (matrix). One failing won't stop the others.
# After they finish, a cleanse_db job de-dupes + purges junk links.
jobs:

  # ── Apply pending migrations + grouping backfill before anything queries the
  # DB. Runs once, serially, so the parallel scrapers never hit a missing column
  # (e.g. show_key) or race on migrations. Idempotent — a no-op once applied.
  migrate:
    name: "🗄️ Migrate + backfill"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          SITE_URL=${{ secrets.SITE_URL }}
          ENVEOF
      - name: Apply migrations
        run: python manage.py migrate --noinput
      - name: Backfill show grouping (only rows still missing it)
        run: python manage.py backfill_shows --only-missing

  scrape:
    name: ${{ matrix.name }}
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # NOTE: every source now scrapes ALL its categories (--category all),
          # not a hand-picked subset. Each scraper loops its own categories
          # internally with per-page error isolation, so one bad category won't
          # stop the rest.

          # ── 9jarocks (my9jarocks.bz): MAIN SOURCE. ALL categories EXCEPT 18+
          #    ('all_sfw' — Adult is hidden site-wide for ad-network + SEO safety).
          #    Covers Nollywood, Hollywood, foreign, K/C/Thai/JP/Filipino drama,
          #    Bollywood, anime, wrestling, ongoing. upload:false — scrape_9jarocks
          #    has no Telegram file re-host; it still posts links to social. ──
          - name: "🎬 9jarocks · ALL categories (my9jarocks.bz)"
            cmd: "python manage.py scrape_9jarocks --category all_sfw --max-pages 3"
            upload: false
          # ── thenkiri.com: ALL categories (Korean drama+movies, Chinese, Bollywood,
          #    Hollywood, Series, Philippine, K-variety). upload:true — re-hosts new
          #    files to the private Telegram channel. ──
          - name: "🌏 thenkiri · ALL categories"
            cmd: "python manage.py scrape_thenkiri --category all --max-pages 3"
            upload: true
          # ── StreamIMDB — streaming links for movies + TV (already 'all' via both). ──
          - name: "▶️ StreamIMDB (movies + TV)"
            cmd: "python manage.py scrape_streamimdb --media both --max-pages 3"
            upload: false
          # ── naijaprey.tv: SUPPLEMENTARY / FALLBACK source (WordPress REST API).
          #    ALL categories. Its links add a second download host as a fallback
          #    when another source's link is dead. It only prunes its OWN stale
          #    links, never other sources'. upload:false — no --upload-files. ──
          - name: "🎯 naijaprey · ALL categories (fallback links)"
            cmd: "python manage.py scrape_naijaprey --category all --max-pages 3"
            upload: false
          # ── Disabled ──
          # - name: "🎞️ Nkiri"            # disabled — not useful
          #   cmd: "python manage.py scrape_nkiri --max-pages 3"
          #   upload: false
          # - name: "📦 MovieBox"         # disabled — using StreamIMDB only
          #   cmd: "python manage.py scrape_moviebox --media both"
          #   upload: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install telethon django-redis

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MOVIES_CHANNEL=${{ secrets.TELEGRAM_MOVIES_CHANNEL }}
          TELEGRAM_ANIME_CHANNEL=${{ secrets.TELEGRAM_ANIME_CHANNEL }}
          TELEGRAM_MANGA_CHANNEL=${{ secrets.TELEGRAM_MANGA_CHANNEL }}
          TWITTER_CLIENT_ID=${{ secrets.TWITTER_CLIENT_ID }}
          TWITTER_CLIENT_SECRET=${{ secrets.TWITTER_CLIENT_SECRET }}
          TWITTER_REFRESH_TOKEN=${{ secrets.TWITTER_REFRESH_TOKEN }}
          FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN=${{ secrets.FB_ACCESS_TOKEN }}
          SITE_URL=${{ secrets.SITE_URL }}
          TELETHON_API_ID=${{ secrets.TELETHON_API_ID }}
          TELETHON_API_HASH=${{ secrets.TELETHON_API_HASH }}
          TELETHON_SESSION_NAME=uploader
          TELETHON_PRIVATE_CHANNEL=${{ secrets.TELETHON_PRIVATE_CHANNEL }}
          ENVEOF

      - name: Restore Telethon session
        if: ${{ matrix.upload && vars.DATA_ONLY != 'true' }}
        run: |
          echo "${{ secrets.TELETHON_SESSION_B64 }}" | base64 --decode > uploader.session
          echo "✅ Telethon session restored ($(wc -c < uploader.session) bytes)"

      - name: Run scraper
        run: |
          CMD="${{ matrix.cmd }}"
          if [ "${{ vars.DATA_ONLY }}" = "true" ]; then
            # Secondary (app-DB) account: scrape DATA only — no Telegram, no FB/Twitter.
            CMD="$CMD --no-social"
          else
            UPLOAD="${{ github.event.inputs.upload_files || 'true' }}"
            if [ "${{ matrix.upload }}" = "true" ] && [ "$UPLOAD" = "true" ]; then
              CMD="$CMD --upload-files"
            fi
          fi
          echo "▶️  $CMD"
          $CMD

      - name: Cleanup temp files
        if: always()
        run: |
          [ -d /tmp/tg_uploads ] && rm -rf /tmp/tg_uploads/* || true
          df -h /

  # ── After all scrapers: merge dup categories/movies + purge junk links ──────
  cleanse:
    name: "🧹 Cleanse + Enrich"
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          SITE_URL=${{ secrets.SITE_URL }}
          TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          R2_ACCOUNT_ID=${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET=${{ vars.R2_BUCKET }}
          R2_PUBLIC_URL=${{ vars.R2_PUBLIC_URL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS=${{ secrets.GEMINI_API_KEYS }}
          ENVEOF
      - name: Run cleanse_db
        run: python manage.py cleanse_db

      # "Gist" entertainment-news feed — only the app-DB account scrapes it
      # (that's the DB the app reads), which also halves Gemini usage.
      - name: Scrape entertainment news (Gist)
        if: ${{ vars.DATA_ONLY == 'true' }}
        continue-on-error: true
        # Curates the juiciest ~2/category. The scrape workflow fires every 6h,
        # but news only needs refreshing ~twice a day — so run at 00:00 & 12:00
        # UTC (and always on a manual dispatch).
        run: |
          H=$(date -u +%H)
          if [ "$H" = "00" ] || [ "$H" = "12" ] || [ "${{ github.event_name }}" != "schedule" ]; then
            python manage.py scrape_news
          else
            echo "Skipping Gist news this run (only ~00:00 & 12:00 UTC)."
          fi

      # Organise download links for multi-source fallback (priority + per-episode
      # grouping) across EVERY source — 9jarocks, thenkiri, naijaprey, etc.
      - name: Backfill download-link fallback metadata
        continue-on-error: true
        run: python manage.py backfill_download_meta

      # ── Auto-enrichment (each runs only on new/un-done rows, so it's quick) ──
      - name: Re-host new images to R2
        continue-on-error: true
        run: python manage.py rehost_images --workers 8
      - name: Enrich new titles from TMDB (rating/trailer/cast/poster)
        continue-on-error: true
        run: python manage.py enrich_tmdb --workers 6
      # Tag movies with TMDB's real genres as browsable categories. New titles
      # are tagged by enrich_tmdb above; this clears the existing backlog a
      # chunk at a time (resumable via genres_synced), so it finishes over a few
      # runs and then just keeps up.
      - name: Tag movies with TMDB genres
        continue-on-error: true
        run: python manage.py backfill_genres --workers 6 --limit 6000
      - name: Refresh Netflix/Prime availability (TMDB watch-providers, NG)
        continue-on-error: true
        run: python manage.py fetch_providers --region NG --days 7 --workers 6
      - name: Refresh Coming Soon
        continue-on-error: true
        run: python manage.py fetch_upcoming --pages 3

      # One batched "new titles added" push to all app users.
      # Only the app-DB account (DATA_ONLY=true) sends it, so users get it once.
      - name: Notify app users of new content
        if: ${{ vars.DATA_ONLY == 'true' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python manage.py notify_new_content

      # Personalized: only ping users who watchlisted a series that got a new ep.
      - name: Personalized new-episode push
        if: ${{ vars.DATA_ONLY == 'true' }}
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python manage.py notify_new_episodes --hours 13

      # Personalized: ping users who tapped "Notify me" on a Coming Soon title
      # that has now entered the catalogue.
      - name: Notify Coming Soon "notify me" arrivals
        if: ${{ vars.DATA_ONLY == 'true' }}
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python manage.py notify_upcoming_arrivals

      # Fulfil "Request a Title" submissions: match the catalogue or targeted-
      # scrape 9jarocks → thenkiri, then push the requester.
      - name: Process title requests
        if: ${{ vars.DATA_ONLY == 'true' }}
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python manage.py process_requests
