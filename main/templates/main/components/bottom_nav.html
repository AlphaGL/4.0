{% load static %}

{# Mobile Bottom Navigation #}
<nav id="bottomNav" class="lg:hidden fixed bottom-0 left-0 right-0 z-50 transition-transform duration-300 safe-area-bottom">
  <div class="mx-3 mb-3 bg-white/95 dark:bg-gray-900/95 backdrop-blur-2xl rounded-3xl shadow-2xl border border-gray-200/50 dark:border-gray-700/50">
    <div class="grid grid-cols-4 gap-0 px-2">

      {# Home #}
      <a href="{% url 'main:home' %}"
         class="flex flex-col items-center justify-center py-3 transition-all relative group
                {% if request.path == '/' %}text-blue-600 dark:text-blue-400{% else %}text-gray-500 dark:text-gray-400{% endif %}">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl mb-0.5 transition-all
                    {% if request.path == '/' %}bg-blue-100 dark:bg-blue-900/30{% else %}group-active:scale-90 group-active:bg-gray-100 dark:group-active:bg-gray-800/50{% endif %}">
          <i class="fas fa-house text-base"></i>
        </div>
        <span class="text-[9px] font-semibold">Home</span>
      </a>

      {# Movies #}
      <a href="{% url 'movies:home' %}"
         class="flex flex-col items-center justify-center py-3 transition-all relative group
                {% if 'movies' in request.path %}text-blue-600 dark:text-blue-400{% else %}text-gray-500 dark:text-gray-400{% endif %}">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl mb-0.5 transition-all
                    {% if 'movies' in request.path %}bg-blue-100 dark:bg-blue-900/30{% else %}group-active:scale-90 group-active:bg-gray-100 dark:group-active:bg-gray-800/50{% endif %}">
          <i class="fas fa-film text-base"></i>
        </div>
        <span class="text-[9px] font-semibold">Movies</span>
      </a>

      {# Anime #}
      <a href="{% url 'anime:list' %}"
         class="flex flex-col items-center justify-center py-3 transition-all relative group
                {% if 'anime' in request.path %}text-purple-600 dark:text-purple-400{% else %}text-gray-500 dark:text-gray-400{% endif %}">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl mb-0.5 transition-all
                    {% if 'anime' in request.path %}bg-purple-100 dark:bg-purple-900/30{% else %}group-active:scale-90 group-active:bg-gray-100 dark:group-active:bg-gray-800/50{% endif %}">
          <i class="fas fa-play-circle text-base"></i>
        </div>
        <span class="text-[9px] font-semibold">Anime</span>
      </a>

      {# Manga #}
      <a href="{% url 'manga:list' %}"
         class="flex flex-col items-center justify-center py-3 transition-all relative group
                {% if 'manga' in request.path %}text-pink-600 dark:text-pink-400{% else %}text-gray-500 dark:text-gray-400{% endif %}">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl mb-0.5 transition-all
                    {% if 'manga' in request.path %}bg-pink-100 dark:bg-pink-900/30{% else %}group-active:scale-90 group-active:bg-gray-100 dark:group-active:bg-gray-800/50{% endif %}">
          <i class="fas fa-book text-base"></i>
        </div>
        <span class="text-[9px] font-semibold">Manga</span>
      </a>

    </div>
  </div>
</nav>

{# Desktop Side Navigation #}
<nav id="desktopNav" class="hidden lg:block fixed left-6 top-1/2 -translate-y-1/2 z-50 transition-transform duration-300">
  <div class="flex flex-col gap-2 bg-white/90 dark:bg-gray-900/90 backdrop-blur-2xl rounded-3xl p-3 shadow-2xl border border-gray-200/50 dark:border-gray-700/50">

    {# Home #}
    <a href="{% url 'main:home' %}"
       class="group relative flex items-center justify-center w-14 h-14 rounded-2xl transition-all
              {% if request.path == '/' %}bg-gradient-to-br from-blue-500 to-blue-600 text-white shadow-lg shadow-blue-500/30{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:scale-105{% endif %}">
      <i class="fas fa-house text-xl"></i>
      <span class="absolute left-full ml-4 px-4 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm font-semibold rounded-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-all whitespace-nowrap shadow-xl scale-90 group-hover:scale-100">
        Home
      </span>
    </a>

    {# Movies #}
    <a href="{% url 'movies:home' %}"
       class="group relative flex items-center justify-center w-14 h-14 rounded-2xl transition-all
              {% if 'movies' in request.path %}bg-gradient-to-br from-blue-500 to-blue-600 text-white shadow-lg shadow-blue-500/30{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:scale-105{% endif %}">
      <i class="fas fa-film text-xl"></i>
      <span class="absolute left-full ml-4 px-4 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm font-semibold rounded-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-all whitespace-nowrap shadow-xl scale-90 group-hover:scale-100">
        Movies
      </span>
    </a>

    {# Anime #}
    <a href="{% url 'anime:list' %}"
       class="group relative flex items-center justify-center w-14 h-14 rounded-2xl transition-all
              {% if 'anime' in request.path %}bg-gradient-to-br from-purple-500 to-purple-600 text-white shadow-lg shadow-purple-500/30{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:scale-105{% endif %}">
      <i class="fas fa-play-circle text-xl"></i>
      <span class="absolute left-full ml-4 px-4 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm font-semibold rounded-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-all whitespace-nowrap shadow-xl scale-90 group-hover:scale-100">
        Anime
      </span>
    </a>

    {# Manga #}
    <a href="{% url 'manga:list' %}"
       class="group relative flex items-center justify-center w-14 h-14 rounded-2xl transition-all
              {% if 'manga' in request.path %}bg-gradient-to-br from-pink-500 to-pink-600 text-white shadow-lg shadow-pink-500/30{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:scale-105{% endif %}">
      <i class="fas fa-book text-xl"></i>
      <span class="absolute left-full ml-4 px-4 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm font-semibold rounded-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-all whitespace-nowrap shadow-xl scale-90 group-hover:scale-100">
        Manga
      </span>
    </a>

    {# Divider #}
    <div class="h-px bg-gradient-to-r from-transparent via-gray-300 dark:via-gray-700 to-transparent my-1"></div>

    {# Scroll to Top #}
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})"
            class="group relative flex items-center justify-center w-14 h-14 rounded-2xl text-gray-600 dark:text-gray-400 hover:bg-gradient-to-br hover:from-gray-500 hover:to-gray-600 hover:text-white transition-all hover:scale-105 hover:shadow-lg">
      <i class="fas fa-arrow-up text-xl"></i>
      <span class="absolute left-full ml-4 px-4 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm font-semibold rounded-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-all whitespace-nowrap shadow-xl scale-90 group-hover:scale-100">
        Back to Top
      </span>
    </button>

  </div>
</nav>

{# Spacer for mobile bottom nav #}
<div id="navSpacer" class="lg:hidden h-20 transition-all duration-300"></div>

<style>
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
  }
  html { scroll-behavior: smooth; }
  nav a, nav button { -webkit-tap-highlight-color: transparent; }
  .nav-hidden { transform: translateY(calc(100% + 1rem)); }
  .spacer-collapsed { height: 0 !important; }
  .desktop-nav-hidden { transform: translateX(-120%) translateY(-50%); }
  @media (min-width: 1024px) {
    body { padding-left: 120px; }
  }
</style>

<script>
  // Auto-hide bottom navigation on scroll (Mobile)
  (function() {
    const bottomNav = document.getElementById('bottomNav');
    const navSpacer = document.getElementById('navSpacer');
    if (!bottomNav || !navSpacer) return;
    let lastScroll = 0, isNavVisible = true;
    function throttle(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(...args), wait);
      };
    }
    const handleScroll = throttle(function() {
      const cur = window.pageYOffset || document.documentElement.scrollTop;
      if (cur <= 50) {
        if (!isNavVisible) { bottomNav.classList.remove('nav-hidden'); navSpacer.classList.remove('spacer-collapsed'); isNavVisible = true; }
        return;
      }
      if (cur > lastScroll && isNavVisible && cur > 100) {
        bottomNav.classList.add('nav-hidden'); navSpacer.classList.add('spacer-collapsed'); isNavVisible = false;
      } else if (cur < lastScroll && !isNavVisible) {
        bottomNav.classList.remove('nav-hidden'); navSpacer.classList.remove('spacer-collapsed'); isNavVisible = true;
      }
      lastScroll = cur <= 0 ? 0 : cur;
    }, 100);
    window.addEventListener('scroll', handleScroll, { passive: true });
    window.addEventListener('scroll', function() {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100 && !isNavVisible) {
        bottomNav.classList.remove('nav-hidden'); navSpacer.classList.remove('spacer-collapsed'); isNavVisible = true;
      }
    }, { passive: true });
  })();

  // Auto-hide desktop navigation on scroll
  (function() {
    const desktopNav = document.getElementById('desktopNav');
    if (!desktopNav) return;
    let lastScroll = 0, isNavVisible = true, hideTimeout;
    function throttle(func, wait) {
      let timeout;
      return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func(...args), wait); };
    }
    const handleDesktopScroll = throttle(function() {
      const cur = window.pageYOffset || document.documentElement.scrollTop;
      if (cur <= 50) {
        if (!isNavVisible) { desktopNav.classList.remove('desktop-nav-hidden'); isNavVisible = true; }
        return;
      }
      if (cur > lastScroll && isNavVisible && cur > 200) {
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => { desktopNav.classList.add('desktop-nav-hidden'); isNavVisible = false; }, 1000);
      } else if (cur < lastScroll && !isNavVisible) {
        desktopNav.classList.remove('desktop-nav-hidden'); isNavVisible = true;
      }
      lastScroll = cur <= 0 ? 0 : cur;
    }, 100);
    window.addEventListener('scroll', handleDesktopScroll, { passive: true });
    document.addEventListener('mousemove', function(e) {
      if (e.clientX < 150 && !isNavVisible) { desktopNav.classList.remove('desktop-nav-hidden'); isNavVisible = true; }
    });
    window.addEventListener('scroll', function() {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100 && !isNavVisible) {
        desktopNav.classList.remove('desktop-nav-hidden'); isNavVisible = true;
      }
    }, { passive: true });
  })();
</script>
