<script>
  /**
 * Watch2D Google Review Integration System - Non-Intrusive Version
 * Shows review request without blocking user interaction
 * Blocks ads when review popup is active
 */

(function() {
    'use strict';
    
    // Configuration - Easy to modify
    const Watch2D_CONFIG = {
        REVIEW_URL: 'https://g.page/r/CRSgilums2fuEAI/review',
        POPUP_DELAY: 15000, // 0.25 minutes in milliseconds
        BUSINESS_NAME: 'Watch2D',
        ZONE_IDS: ['9487215', '9487214'], // Your ad zone IDs from the document
        STORAGE_KEYS: {
            HAS_REVIEWED: 'Watch2D_has_reviewed',
            REVIEW_DATE: 'Watch2D_review_date',
            POPUP_SHOWN: 'Watch2D_popup_shown_session',
            DISMISSED_COUNT: 'Watch2D_dismissed_count'
        }
    };
    
    // State management
    let timeOnSite = 0;
    let reviewPopupActive = false;
    let popupShownThisSession = false;
    let originalPopunderFunctions = {};
    
    // Initialize the system
    function initializeReviewSystem() {
        startTimeTracking();
        interceptPopunderAds();
        
        // Check if we should show popup after delay
        setTimeout(() => {
            if (shouldShowReviewPopup()) {
                showReviewPopup();
            }
        }, Watch2D_CONFIG.POPUP_DELAY);
    }
    
    // Time tracking
    function startTimeTracking() {
        setInterval(() => {
            timeOnSite += 1000;
            
            // Also check if enough time has passed (backup trigger)
            if (timeOnSite >= Watch2D_CONFIG.POPUP_DELAY && shouldShowReviewPopup()) {
                showReviewPopup();
            }
        }, 1000);
    }
    
    // Check if popup should be shown
    function shouldShowReviewPopup() {
        const dismissedCount = parseInt(localStorage.getItem(Watch2D_CONFIG.STORAGE_KEYS.DISMISSED_COUNT) || '0');
        return !hasReviewedBefore() && 
              !popupShownThisSession && 
              !reviewPopupActive &&
              timeOnSite >= Watch2D_CONFIG.POPUP_DELAY &&
              dismissedCount < 3; // Stop showing after 3 dismissals
    }
    
    // Check if user has reviewed before
    function hasReviewedBefore() {
        return localStorage.getItem(Watch2D_CONFIG.STORAGE_KEYS.HAS_REVIEWED) === 'true';
    }
    
    // Mark user as having reviewed
    function markAsReviewed() {
        localStorage.setItem(Watch2D_CONFIG.STORAGE_KEYS.HAS_REVIEWED, 'true');
        localStorage.setItem(Watch2D_CONFIG.STORAGE_KEYS.REVIEW_DATE, new Date().toISOString());
    }
    
    // Increment dismissed count
    function incrementDismissedCount() {
        const count = parseInt(localStorage.getItem(Watch2D_CONFIG.STORAGE_KEYS.DISMISSED_COUNT) || '0');
        localStorage.setItem(Watch2D_CONFIG.STORAGE_KEYS.DISMISSED_COUNT, (count + 1).toString());
    }
    
    // Intercept and control popunder ads
    function interceptPopunderAds() {
        // Store original functions
        if (window._sfxyz) {
            originalPopunderFunctions._sfxyz = window._sfxyz;
        }
        if (window._iamkeom) {
            originalPopunderFunctions._iamkeom = window._iamkeom;
        }
        
        // Override the popunder functions
        window._sfxyz = function() {
            if (reviewPopupActive) {
                console.log('Watch2D: Popunder blocked - review popup active');
                return false;
            }
            return originalPopunderFunctions._sfxyz ? originalPopunderFunctions._sfxyz.apply(this, arguments) : true;
        };
        
        window._iamkeom = function() {
            if (reviewPopupActive) {
                console.log('Watch2D: Popunder blocked - review popup active');
                return false;
            }
            return originalPopunderFunctions._iamkeom ? originalPopunderFunctions._iamkeom.apply(this, arguments) : true;
        };
    }
    
    // Show the non-intrusive review popup
    function showReviewPopup() {
        if (popupShownThisSession || reviewPopupActive) return;
        
        popupShownThisSession = true;
        reviewPopupActive = true;
        
        // Create popup container (positioned, not overlay)
        const popup = document.createElement('div');
        popup.id = 'Watch2D-review-popup';
        popup.innerHTML = createPopupHTML();
        
        // Add styles
        const style = document.createElement('style');
        style.textContent = getPopupStyles();
        document.head.appendChild(style);
        
        document.body.appendChild(popup);
        
        // Add event listeners
        setupPopupEvents(popup);
        
        // Auto-minimize after 15 seconds if no interaction
        setTimeout(() => {
            const popupElement = document.getElementById('Watch2D-review-popup');
            if (popupElement && !popupElement.classList.contains('minimized')) {
                minimizePopup();
            }
        }, 15000);
        
        // Auto-close after 60 seconds total
        setTimeout(() => {
            if (document.getElementById('Watch2D-review-popup')) {
                closeReviewPopup(true); // true = auto-dismissed
            }
        }, 60000);
    }
    
    // Create popup HTML based on user status
    function createPopupHTML() {
        const hasReviewed = hasReviewedBefore();
        const reviewDate = hasReviewed ? new Date(localStorage.getItem(Watch2D_CONFIG.STORAGE_KEYS.REVIEW_DATE)) : null;
        
        if (hasReviewed) {
            // Returning user popup
            return `
                <div class="Watch2D-popup-container returning-user">
                    <div class="Watch2D-popup-header">
                        <span class="Watch2D-popup-icon">👋</span>
                        <button class="Watch2D-popup-close" onclick="closeReviewPopup()">&times;</button>
                        <button class="Watch2D-popup-minimize" onclick="minimizePopup()">−</button>
                    </div>
                    <div class="Watch2D-popup-content">
                        <h3>Welcome Back!</h3>
                        <p>Thanks for your review on ${reviewDate ? reviewDate.toLocaleDateString() : 'your previous visit'}!</p>
                        <div class="Watch2D-popup-actions">
                            <a href="${Watch2D_CONFIG.REVIEW_URL}" target="_blank" class="Watch2D-btn Watch2D-btn-primary" onclick="handleReviewClick()">
                                📝 Update Review
                            </a>
                            <button class="Watch2D-btn Watch2D-btn-secondary" onclick="closeReviewPopup()">
                                Close
                            </button>
                        </div>
                    </div>
                    <div class="Watch2D-popup-minimized">
                        <span class="Watch2D-popup-icon">👋</span>
                        <span>Welcome back!</span>
                    </div>
                </div>
            `;
        } else {
            // First-time user popup
            return `
                <div class="Watch2D-popup-container">
                    <div class="Watch2D-popup-header">
                        <span class="Watch2D-popup-icon">⭐</span>
                        <button class="Watch2D-popup-close" onclick="closeReviewPopup()">&times;</button>
                        <button class="Watch2D-popup-minimize" onclick="minimizePopup()">−</button>
                    </div>
                    <div class="Watch2D-popup-content">
                        <h3>Loving ${Watch2D_CONFIG.BUSINESS_NAME}?</h3>
                        <p>Quick 30-second review? It helps us grow! 🎬</p>
                        <div class="Watch2D-popup-actions">
                            <a href="${Watch2D_CONFIG.REVIEW_URL}" target="_blank" class="Watch2D-btn Watch2D-btn-primary" onclick="handleReviewClick()">
                                ⭐ Leave Review
                            </a>
                            <button class="Watch2D-btn Watch2D-btn-secondary" onclick="closeReviewPopup()">
                                Not Now
                            </button>
                        </div>
                    </div>
                    <div class="Watch2D-popup-minimized">
                        <span class="Watch2D-popup-icon">⭐</span>
                        <span>Review us?</span>
                    </div>
                </div>
            `;
        }
    }
    
    // Get popup styles - Non-intrusive positioning
    function getPopupStyles() {
        return `
            #Watch2D-review-popup {
                position: fixed;
                bottom: 20px;
                right: 20px;
                z-index: 999999;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                pointer-events: auto;
            }
            
            .Watch2D-popup-container {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                border-radius: 12px;
                width: 320px;
                color: white;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                border: 2px solid #4a90e2;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                animation: Watch2D-slideInRight 0.4s ease;
                overflow: hidden;
            }
            
            .Watch2D-popup-container.returning-user {
                background: linear-gradient(135deg, #2d1b69 0%, #11998e 100%);
                border-color: #11998e;
            }
            
            .Watch2D-popup-container.minimized {
                width: 160px;
                cursor: pointer;
            }
            
            .Watch2D-popup-container.minimized .Watch2D-popup-content {
                display: none;
            }
            
            .Watch2D-popup-container:not(.minimized) .Watch2D-popup-minimized {
                display: none;
            }
            
            .Watch2D-popup-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 15px 8px;
                background: rgba(255, 255, 255, 0.1);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .Watch2D-popup-icon {
                font-size: 18px;
                font-weight: bold;
            }
            
            .Watch2D-popup-close,
            .Watch2D-popup-minimize {
                background: none;
                border: none;
                color: white;
                font-size: 18px;
                cursor: pointer;
                width: 24px;
                height: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
                transition: background 0.2s ease;
                margin-left: 5px;
            }
            
            .Watch2D-popup-close:hover,
            .Watch2D-popup-minimize:hover {
                background: rgba(255, 255, 255, 0.2);
            }
            
            .Watch2D-popup-content {
                padding: 15px;
            }
            
            .Watch2D-popup-content h3 {
                margin: 0 0 8px 0;
                font-size: 16px;
                color: #4a90e2;
                font-weight: 600;
            }
            
            .returning-user .Watch2D-popup-content h3 {
                color: #11998e;
            }
            
            .Watch2D-popup-content p {
                margin: 0 0 15px 0;
                line-height: 1.4;
                font-size: 13px;
                opacity: 0.9;
            }
            
            .Watch2D-popup-actions {
                display: flex;
                gap: 8px;
                flex-direction: column;
            }
            
            .Watch2D-btn {
                padding: 8px 12px;
                border: none;
                border-radius: 6px;
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                text-decoration: none;
                text-align: center;
                display: block;
            }
            
            .Watch2D-btn-primary {
                background: linear-gradient(45deg, #4a90e2, #357abd);
                color: white;
                box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
            }
            
            .Watch2D-btn-primary:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
            }
            
            .returning-user .Watch2D-btn-primary {
                background: linear-gradient(45deg, #11998e, #0f7a70);
                box-shadow: 0 2px 8px rgba(17, 153, 142, 0.3);
            }
            
            .returning-user .Watch2D-btn-primary:hover {
                box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
            }
            
            .Watch2D-btn-secondary {
                background: rgba(255, 255, 255, 0.1);
                color: white;
                border: 1px solid rgba(255, 255, 255, 0.3);
            }
            
            .Watch2D-btn-secondary:hover {
                background: rgba(255, 255, 255, 0.2);
            }
            
            .Watch2D-popup-minimized {
                padding: 12px 15px;
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            
            .Watch2D-popup-minimized:hover {
                background: rgba(255, 255, 255, 0.1);
            }
            
            @keyframes Watch2D-slideInRight {
                from { 
                    transform: translateX(100%); 
                    opacity: 0; 
                }
                to { 
                    transform: translateX(0); 
                    opacity: 1; 
                }
            }
            
            @keyframes Watch2D-bounce {
                0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
                40% { transform: translateY(-5px); }
                60% { transform: translateY(-3px); }
            }
            
            /* Attention grabber animation */
            .Watch2D-popup-container:not(.minimized) {
                animation: Watch2D-slideInRight 0.4s ease, Watch2D-bounce 2s ease 5s;
            }
            
            /* Mobile responsiveness */
            @media (max-width: 480px) {
                #Watch2D-review-popup {
                    bottom: 10px;
                    right: 10px;
                    left: 10px;
                }
                
                .Watch2D-popup-container {
                    width: auto;
                    max-width: none;
                }
                
                .Watch2D-popup-container.minimized {
                    width: 140px;
                    margin-left: auto;
                }
            }
            
            /* Ensure popup doesn't interfere with page content */
            body {
                /* Add bottom padding only when popup is active */
            }
            
            .Watch2D-popup-container {
                /* Ensure popup stays above everything */
                isolation: isolate;
            }
        `;
    }
    
    // Setup popup event listeners
    function setupPopupEvents(popup) {
        // Click on minimized popup to expand
        popup.addEventListener('click', function(e) {
            if (popup.classList.contains('minimized') && !e.target.classList.contains('Watch2D-popup-close')) {
                expandPopup();
            }
        });
    }
    
    // Minimize popup
    window.minimizePopup = function() {
        const popup = document.getElementById('Watch2D-review-popup');
        if (popup) {
            popup.firstElementChild.classList.add('minimized');
        }
    };
    
    // Expand popup
    function expandPopup() {
        const popup = document.getElementById('Watch2D-review-popup');
        if (popup) {
            popup.firstElementChild.classList.remove('minimized');
            // Auto-minimize again after 10 seconds
            setTimeout(() => {
                if (popup && !popup.firstElementChild.classList.contains('minimized')) {
                    minimizePopup();
                }
            }, 10000);
        }
    }
    
    // Handle review button click
    window.handleReviewClick = function() {
        markAsReviewed();
        closeReviewPopup();
        
        // Optional: Track for analytics
        if (typeof gtag !== 'undefined') {
            gtag('event', 'review_click', {
                'event_category': 'engagement',
                'event_label': 'google_review'
            });
        }
        
        console.log('Watch2D: User clicked to leave a review');
    };
    
    // Close popup and restore ad functionality
    window.closeReviewPopup = function(autoDismissed = false) {
        const popup = document.getElementById('Watch2D-review-popup');
        if (popup) {
            popup.style.animation = 'Watch2D-slideOutRight 0.3s ease forwards';
            setTimeout(() => {
                popup.remove();
            }, 300);
        }
        
        reviewPopupActive = false;
        
        // Increment dismissed count only if manually closed
        if (!autoDismissed && !hasReviewedBefore()) {
            incrementDismissedCount();
        }
        
        // Show thank you message for returning users
        if (hasReviewedBefore()) {
            showThankYouMessage();
        }
        
        console.log('Watch2D: Review popup closed, ads restored');
    };
    
    // Add slide out animation
    const additionalStyles = `
        @keyframes Watch2D-slideOutRight {
            from { 
                transform: translateX(0); 
                opacity: 1; 
            }
            to { 
                transform: translateX(100%); 
                opacity: 0; 
            }
        }
    `;
    
    // Show thank you message
    function showThankYouMessage() {
        const thankYou = document.createElement('div');
        thankYou.innerHTML = `
            <div style="
                position: fixed; 
                bottom: 20px; 
                right: 20px; 
                background: linear-gradient(45deg, #11998e, #0f7a70);
                color: white; 
                padding: 12px 16px;
                border-radius: 8px; 
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                font-weight: 600;
                z-index: 999998;
                animation: Watch2D-slideInRight 0.3s ease;
                max-width: 280px;
                font-size: 13px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            ">
                ✅ Thanks for supporting ${Watch2D_CONFIG.BUSINESS_NAME}! 🎬
            </div>
        `;
        
        document.body.appendChild(thankYou);
        
        // Auto-remove after 4 seconds
        setTimeout(() => {
            thankYou.firstElementChild.style.animation = 'Watch2D-slideOutRight 0.3s ease forwards';
            setTimeout(() => thankYou.remove(), 300);
        }, 4000);
    }
    
    // Manual trigger for testing (Ctrl+Shift+R)
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && e.key === 'R') {
            e.preventDefault();
            popupShownThisSession = false;
            showReviewPopup();
            console.log('Watch2D: Manual review popup triggered for testing');
        }
    });
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeReviewSystem);
    } else {
        initializeReviewSystem();
    }
    
    // Debug info (remove in production)
    window.Watch2D_DEBUG = {
        getTimeOnSite: () => Math.floor(timeOnSite / 1000) + ' seconds',
        hasReviewed: hasReviewedBefore,
        isPopupActive: () => reviewPopupActive,
        forceShowPopup: () => {
            popupShownThisSession = false;
            showReviewPopup();
        },
        resetReviewStatus: () => {
            Object.values(Watch2D_CONFIG.STORAGE_KEYS).forEach(key => {
                localStorage.removeItem(key);
            });
            console.log('Watch2D: Review status reset');
        },
        getDismissedCount: () => localStorage.getItem(Watch2D_CONFIG.STORAGE_KEYS.DISMISSED_COUNT) || '0'
    };
    
})();
</script>
